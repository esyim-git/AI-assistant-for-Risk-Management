name: governance-soft-guard

# Manual only while GitHub Actions minutes are exhausted (see ci.yml for the operating model).
# Squash-merge + "(#PR)" commit-subject discipline is currently enforced by the Claude-driven
# merge process + code review. To restore automatic enforcement after the monthly reset, add back:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main, develop ]
on:
  workflow_dispatch:

jobs:
  main-soft-guard:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify main push provenance
        shell: pwsh
        run: ./build/04_verify-main-soft-guard.ps1
