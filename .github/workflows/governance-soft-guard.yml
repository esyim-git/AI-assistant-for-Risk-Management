name: governance-soft-guard

# Advisory post-merge provenance check. Hard branch protection is the primary
# control once docs/32 Phase A is applied.
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main-soft-guard:
    name: main-soft-guard
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify main push provenance
        shell: pwsh
        run: ./build/04_verify-main-soft-guard.ps1
