name: ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore src/RiskManagementAI.App/RiskManagementAI.App.csproj
      - name: Build
        run: dotnet build src/RiskManagementAI.App/RiskManagementAI.App.csproj -c Release --no-restore
      - name: Smoke Tests
        run: dotnet run --project tests/RiskManagementAI.SmokeTests/RiskManagementAI.SmokeTests.csproj -c Release
